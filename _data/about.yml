# Your bio/about content (supports Markdown)
content: |
  I am a **PhD Candidate in Machine Learning** at **Georgia Tech**, based in the
  [H. Milton Stewart School of Industrial and Systems Engineering](https://www.isye.gatech.edu/),
  advised by **[Dr. Gian-Gabriel Garcia](https://giangabrielgarcia.com/)**. My research sits at the intersection of
  **decision-focused learning**, **sequential decision-making under uncertainty**, and
  **reinforcement learning**, with a focus on **healthcare applications** where decisions
  are shaped by limited resources and noisy observations.

  Current projects include learning **neural index policies for restless multi-action
  bandits** with heterogeneous budgets (with applications to clinical deterioration in
  hospitalized children), **resource-constrained diagnostic test design**.

  <hr class="bio-separator">

  Before starting my PhD, I worked as an **Applied Scientist** at
  [Lucas Systems](https://www.lucasware.com/) (2019&ndash;2022) building optimization and ML
  tools for warehouse operations. I received my B.S. in Computer Science (with minors in Mathematics and Physics) from the
  **University of Cincinnati** in [College of Engineering and Applied Science](https://ceas.uc.edu/) in 2019.

  <hr class="bio-separator">

